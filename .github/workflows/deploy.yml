name: Deploy Supabase Edge Functions

"on":
  push:
    branches:
      - master
    # Only run when edge functions (or this workflow) change, so frontend-only
    # pushes don't trigger — or fail — the Supabase deploy.
    paths:
      - "supabase/functions/**"
      - ".github/workflows/deploy.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          # Pin a specific CLI version. Using "latest" makes the action query
          # GitHub's API for the newest release, which gets rate-limited and
          # fails the job. Bump this when you want a newer CLI.
          version: 2.84.2

      - run: supabase functions deploy --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          # Opt into Node.js 24 now to silence the deprecation warning from
          # supabase/setup-cli@v1 until a Node-24-native version is released.
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
