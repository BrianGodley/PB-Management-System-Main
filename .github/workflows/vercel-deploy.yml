name: Deploy Frontend to Vercel (Production)

# Auto-deploys the app to Vercel production on every push to master.
# Independent of Vercel's GitHub App integration — uses the Vercel CLI + a token,
# so it keeps working even if the native Git connection breaks.

"on":
  push:
    branches:
      - master

# Only the newest push to master deploys; supersede in-flight runs.
concurrency:
  group: vercel-prod
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      # Project + team IDs (from .vercel/repo.json). Not secret — safe to inline.
      VERCEL_ORG_ID: team_dbCLCcBlidXsibKRdoXfl8hT
      VERCEL_PROJECT_ID: prj_FW1ebBDBS6ayby1G9TuBkrDN409V
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel project settings + env
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy prebuilt to production
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
